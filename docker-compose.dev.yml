version: "3.9"

services:
    frontend:
        build:
            context: ./frontend
            target: dev-stage
        volumes:
            - ./frontend:/app
            - /app/node_modules
        ports:
            - "5173:5173"
        env_file:
            - ./frontend/.env.development

    backend:
        build:
            context: ./backend
        command: >
            sh -c "python manage.py makemigrations &&
            python manage.py migrate &&
            python manage.py runserver 0.0.0.0:8000"
        volumes:
            - ./backend:/app
        ports:
            - "8000:8000"
        env_file:
            - ./backend/.env.development
        depends_on:
            - db

    db:
        image: postgres:17-alpine3.22
        env_file:
            - .env
        environment:
            POSTGRES_DB: ${DB_NAME}
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        ports:
            - "5432:5432"
