version: "3.9"

services:
    backend:
        build: ./backend
        container_name: biyuyo-backend
        command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
        env_file:
            - ./backend/.env.production
        restart: unless-stopped
        volumes:
            - ./backend:/app
        ports:
            - "8000:8000"
        depends_on:
            - db
        networks:
            - biyuyo-network

    frontend:
        build:
            context: ./frontend
            target: production-stage
        container_name: biyuyo-frontend
        restart: unless-stopped
        volumes:
            - ./frontend:/app
        ports:
            - "80:80"
        depends_on:
            - backend
        networks:
            - biyuyo-network

    db:
        image: postgres:17-alpine3.22
        container_name: biyuyo-db
        restart: unless-stopped
        env_file:
            - .env
        environment:
            POSTGRES_DB: ${DB_NAME}
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        ports:
            - "5432:5432"
        volumes:
            - biyuyo_data:/var/lib/postgresql/data
        networks:
            - biyuyo-network

networks:
    biyuyo-network:
        driver: bridge

volumes:
    biyuyo_data:
